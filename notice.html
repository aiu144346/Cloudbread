<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 | 정우진 AI STRATEGIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .notice-header {
            padding: 10rem 10% 4rem;
            background: linear-gradient(135deg, var(--bg-navy) 0%, var(--navy-light) 100%);
            text-align: center;
        }
        .notice-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: #fff;
            letter-spacing: -1px;
        }
        .notice-section {
            padding: 5rem 10%;
            background: #fff;
            min-height: 60vh;
        }
        .notice-container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .notice-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }
        .notice-tab {
            font-size: 1.1rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        .notice-tab.active {
            color: var(--bg-navy);
        }
        .notice-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1.1rem;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--bg-navy);
        }
        .notice-list {
            border-top: 2px solid #333;
        }
        .notice-item {
            display: grid;
            grid-template-columns: 80px 100px 1fr 120px 50px;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .notice-item:hover {
            background: #f9f9f9;
        }
        .notice-num {
            font-size: 0.9rem;
            color: #999;
            text-align: center;
        }
        .notice-cat {
            background: #f0f0f0;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            text-align: center;
            width: fit-content;
        }
        .notice-cat.important {
            background: rgba(255, 0, 0, 0.05);
            color: #ff4d4d;
            border: 1px solid rgba(255, 0, 0, 0.1);
        }
        .notice-subject {
            font-size: 1.1rem;
            font-weight: 500;
            color: #333;
            padding-left: 1rem;
        }
        .notice-date {
            font-size: 0.9rem;
            color: #888;
            text-align: right;
        }
        .notice-arrow {
            text-align: right;
            color: #ccc;
            font-size: 1.2rem;
        }
        .notice-pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 4rem;
        }
        .page-btn {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            color: #666;
        }
        .page-btn.active {
            background: var(--bg-navy);
            color: #fff;
            border-color: var(--bg-navy);
        }
        .page-btn:hover:not(.active) {
            background: #f5f5f5;
        }

        @media (max-width: 768px) {
            .notice-item {
                grid-template-columns: 80px 1fr 50px;
                padding: 1.2rem 0;
            }
            .notice-num, .notice-date {
                display: none;
            }
            .notice-subject {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="main-header dark-section">
        <nav class="nav-container">
            <div class="logo">CLOUD BREAD</div>
            <ul class="nav-links">
                <li><a href="index.html">홈</a></li>
                <li><a href="showcase.html">강의쇼케이스</a></li>
                <li><a href="youtube.html">유튜브Hub</a></li>
                <li><a href="library.html">저서</a></li>
                <li><a href="activities.html">언론 및 활동</a></li>
                <li><a href="notice.html" class="active">공지사항</a></li>
                <li><a href="archive.html" class="nav-cta">강의 라이브러리</a></li>
            </ul>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </nav>
    </header>

    <div class="notice-header dark-section">
        <h1 class="notice-title reveal">공지사항</h1>
        <p class="hero-subtitle">정우진 전문가의 핵심 소식과 공지사항을 가장 먼저 전해드립니다.</p>
    </div>

    <section class="notice-section">
        <div class="notice-container">
            <div class="notice-tabs">
                <div class="notice-tab active">전체</div>
                <div class="notice-tab">알림</div>
                <div class="notice-tab">보도기사</div>
            </div>

            <div class="notice-list" id="notice-list">
                <!-- Data will be loaded from notices.json -->
            </div>

            <div class="notice-pagination">
                <div class="page-btn active">1</div>
                <div class="page-btn">2</div>
                <div class="page-btn"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>
    </section>

    <!-- Master Footer placeholder (Actual footer should be copied or templated) -->
    <footer class="master-footer dark-section" id="master-footer"></footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('notices.json')
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('notice-list');
                    list.innerHTML = data.map((notice, index) => {
                        const isImportant = notice.category === '알림' && notice.important;
                        const catClass = isImportant ? 'notice-cat important' : 'notice-cat';
                        return `
                            <a href="${notice.link || '#'}" class="notice-item reveal">
                                <div class="notice-num">${data.length - index}</div>
                                <div class="${catClass}">${notice.category}</div>
                                <div class="notice-subject">${notice.title}</div>
                                <div class="notice-date">${notice.date}</div>
                                <div class="notice-arrow"><i class="fas fa-arrow-right"></i></div>
                            </a>
                        `;
                    }).join('');
                })
                .catch(err => console.error("Notice load error:", err));
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
