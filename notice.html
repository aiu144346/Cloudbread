<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 | 정우진 AI STRATEGIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .notice-header {
            padding: 10rem 10% 4rem;
            background: linear-gradient(135deg, var(--bg-navy) 0%, var(--navy-light) 100%);
            text-align: center;
        }
        .notice-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: #fff;
            letter-spacing: -1px;
        }
        .notice-section {
            padding: 5rem 10%;
            background: #fff;
            min-height: 60vh;
        }
        .notice-container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .notice-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }
        .notice-tab {
            font-size: 1.1rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        .notice-tab.active {
            color: var(--bg-navy);
        }
        .notice-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1.1rem;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--bg-navy);
        }
        .notice-list {
            border-top: 2px solid #333;
        }
        .notice-item {
            display: grid;
            grid-template-columns: 80px 100px 1fr 120px 50px;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .notice-item:hover {
            background: #f9f9f9;
        }
        .notice-num {
            font-size: 0.9rem;
            color: #999;
            text-align: center;
        }
        .notice-cat {
            background: #f0f0f0;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            text-align: center;
            width: fit-content;
        }
        .notice-cat.important {
            background: rgba(255, 0, 0, 0.05);
            color: #ff4d4d;
            border: 1px solid rgba(255, 0, 0, 0.1);
        }
        .notice-subject {
            font-size: 1.1rem;
            font-weight: 500;
            color: #333;
            padding-left: 1rem;
        }
        .notice-date {
            font-size: 0.9rem;
            color: #888;
            text-align: right;
        }
        .notice-arrow {
            text-align: right;
            color: #ccc;
            font-size: 1.2rem;
        }
        .notice-pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 4rem;
        }
        .page-btn {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            color: #666;
        }
        .page-btn.active {
            background: var(--bg-navy);
            color: #fff;
            border-color: var(--bg-navy);
        }
        .page-btn:hover:not(.active) {
            background: #f5f5f5;
        }

        @media (max-width: 768px) {
            .notice-item {
                grid-template-columns: 80px 1fr 50px;
                padding: 1.2rem 0;
            }
            .notice-num, .notice-date {
                display: none;
            }
            .notice-subject {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="main-header dark-section">
        <nav class="nav-container">
            <div class="logo">CLOUD BREAD</div>
            <ul class="nav-links">
                <li><a href="index.html">홈</a></li>
                <li><a href="showcase.html">강의쇼케이스</a></li>
                <li><a href="youtube.html">유튜브Hub</a></li>
                <li><a href="library.html">저서</a></li>
                <li><a href="activities.html">언론 및 활동</a></li>
                <li><a href="notice.html" class="active">공지사항</a></li>
                <li><a href="archive.html" class="nav-cta">강의 라이브러리</a></li>
            </ul>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </nav>
    </header>

    <div class="notice-header dark-section">
        <h1 class="notice-title reveal">공지사항</h1>
        <p class="hero-subtitle"><span class="highlight-name">정우진 X 구름빵</span>의 핵심 소식과 공지사항을 가장 먼저 전해드립니다.</p>
    </div>

    <style>
        .highlight-name {
            color: var(--electric-blue);
            font-weight: 800;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
    </style>

    <section class="notice-section">
        <div class="notice-container">
            <div class="notice-tabs">
                <div class="notice-tab active">전체</div>
                <div class="notice-tab" data-cat="알림">알림</div>
                <div class="notice-tab" data-cat="보도기사">보도기사</div>
            </div>

            <div class="notice-list" id="notice-list">
                <!-- Data will be loaded from notices.json -->
            </div>

            <div class="notice-pagination">
                <div class="page-btn active">1</div>
                <div class="page-btn">2</div>
                <div class="page-btn"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>
    </section>

    <!-- Notice Detail Modal -->
    <div id="notice-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-header">
                <span id="modal-cat" class="notice-cat"></span>
                <h2 id="modal-title"></h2>
                <span id="modal-date" class="modal-date"></span>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- content goes here -->
            </div>
            <div class="modal-footer">
                <button class="close-btn" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>

    <style>
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 3rem;
            border-radius: 15px;
            width: 80%;
            max-width: 800px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: modalSlide 0.3s ease-out;
        }
        @keyframes modalSlide {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-modal {
            position: absolute;
            right: 2rem;
            top: 1.5rem;
            font-size: 2rem;
            font-weight: 700;
            color: #aaa;
            cursor: pointer;
        }
        .modal-header {
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        .modal-header h2 {
            font-size: 1.8rem;
            margin: 1rem 0;
            line-height: 1.3;
        }
        .modal-date {
            color: #999;
            font-size: 0.9rem;
        }
        .modal-body {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #444;
            white-space: pre-wrap; /* Preserve line breaks */
            max-height: 50vh;
            overflow-y: auto;
        }
        .modal-footer {
            margin-top: 2rem;
            text-align: center;
        }
        .close-btn {
            background: var(--bg-navy);
            color: #fff;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .close-btn:hover {
            background: #222;
        }
    </style>

    <!-- Master Footer placeholder -->
    <footer class="master-footer dark-section" id="master-footer"></footer>

    <script>
        let allNotices = [];

        function openModal(id) {
            const notice = allNotices.find(n => n.id === id);
            if (!notice) return;

            document.getElementById('modal-cat').innerText = notice.category;
            document.getElementById('modal-cat').className = `notice-cat ${notice.important ? 'important' : ''}`;
            document.getElementById('modal-title').innerText = notice.title;
            document.getElementById('modal-date').innerText = notice.date;
            document.getElementById('modal-body').innerText = notice.content || "상세 내용이 없습니다.";
            
            document.getElementById('notice-modal').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Prevent scroll
        }

        function closeModal() {
            document.getElementById('notice-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetch('notices.json')
                .then(res => res.json())
                .then(data => {
                    allNotices = data;
                    const list = document.getElementById('notice-list');
                    list.innerHTML = data.map((notice, index) => {
                        const isImportant = notice.category === '알림' && notice.important;
                        const catClass = isImportant ? 'notice-cat important' : 'notice-cat';
                        return `
                            <div class="notice-item reveal" onclick="openModal(${notice.id})" style="cursor:pointer">
                                <div class="notice-num">${data.length - index}</div>
                                <div class="${catClass}">${notice.category}</div>
                                <div class="notice-subject">${notice.title}</div>
                                <div class="notice-date">${notice.date}</div>
                                <div class="notice-arrow"><i class="fas fa-arrow-right"></i></div>
                            </div>
                        `;
                    }).join('');
                })
                .catch(err => console.error("Notice load error:", err));

            // Close modal on outside click
            window.onclick = function(event) {
                const modal = document.getElementById('notice-modal');
                if (event.target == modal) closeModal();
            }
            const closeBtn = document.querySelector('.close-modal');
            if(closeBtn) closeBtn.onclick = closeModal;
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
